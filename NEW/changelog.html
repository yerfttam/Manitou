<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Changelog — Manitou Lodge</title>
  <style>
    @font-face {
      font-family: 'NativeRecordSans';
      src: url('fonts/native_record_sans-webfont.woff2') format('woff2'),
           url('fonts/native_record_sans-webfont.woff') format('woff');
      font-weight: normal; font-style: normal;
    }
    @font-face {
      font-family: 'NativeRecordScript';
      src: url('fonts/native_record_script-webfont.woff2') format('woff2'),
           url('fonts/native_record_script-webfont.woff') format('woff');
      font-weight: normal; font-style: normal;
    }
    @font-face {
      font-family: 'NativeRecordSerif';
      src: url('fonts/native_record_serif-webfont.woff2') format('woff2'),
           url('fonts/native_record_serif-webfont.woff') format('woff');
      font-weight: normal; font-style: normal;
    }

    :root {
      --green:       #3a4a24;
      --green-dark:  #373f2e;
      --amber:       #c4822a;
      --cream:       #ddd9bc;
      --cream-light: #e4dfb5;
      --olive:       #8a8153;
      --text-dark:   #2d2a1e;
      --text-mid:    #4a4535;
      --nav-h:       72px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { font-family: Georgia, serif; font-size: 16px; color: var(--text-dark); overflow-x: hidden; background: var(--cream-light); }
    a { text-decoration: none; color: inherit; }
    img { max-width: 100%; display: block; }

    /* ── Nav ── */
    #site-nav { position: fixed; top: 0; left: 0; right: 0; z-index: 1000; background: var(--green-dark); height: var(--nav-h); }
    .nav-inner { max-width: 1280px; margin: 0 auto; height: 100%; padding: 0 2rem; display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; }
    .nav-links { display: flex; align-items: center; gap: 2rem; list-style: none; }
    .nav-left { justify-content: flex-start; }
    .nav-right { justify-content: flex-end; }
    .nav-links a { font-family: 'NativeRecordSans', sans-serif; font-size: 0.7rem; letter-spacing: 0.18em; text-transform: uppercase; color: rgba(255,255,255,0.75); transition: color 0.2s; }
    .nav-links a:hover { color: #fff; }
    .nav-book-btn { background: var(--amber) !important; color: var(--green-dark) !important; padding: 0.5rem 1.25rem !important; font-size: 0.7rem !important; letter-spacing: 0.15em !important; opacity: 1 !important; border-radius: 6px !important; }
    .nav-logo { display: flex; justify-content: center; }
    .nav-logo img { height: 64px; width: auto; }
    .hamburger { display: none; flex-direction: column; gap: 5px; cursor: pointer; background: none; border: none; padding: 4px; }
    .hamburger span { display: block; width: 24px; height: 2px; background: #fff; transition: all 0.3s; }
    .mobile-menu { display: none; position: fixed; top: var(--nav-h); left: 0; right: 0; background: var(--green-dark); z-index: 999; padding: 1.5rem 2rem; flex-direction: column; gap: 0.75rem; }
    .mobile-menu.open { display: flex; }
    .mobile-menu a { font-family: 'NativeRecordSans', sans-serif; font-size: 0.8rem; letter-spacing: 0.15em; text-transform: uppercase; color: rgba(255,255,255,0.8); padding: 0.6rem 0; border-bottom: 1px solid rgba(255,255,255,0.08); }
    .mobile-menu .mob-book { margin-top: 0.5rem; text-align: center; background: var(--amber); color: #fff !important; padding: 0.75rem !important; border-bottom: none !important; }

    /* ── Page hero ── */
    .page-hero {
      background: var(--green-dark);
      padding: calc(var(--nav-h) + 3rem) 2rem 3rem;
      text-align: center;
    }
    .page-hero-label { font-family: 'NativeRecordScript', cursive; font-size: 1.3rem; color: var(--amber); display: block; margin-bottom: 0.75rem; }
    .page-hero-title { font-family: 'NativeRecordSans', sans-serif; font-size: clamp(1.8rem, 4vw, 2.8rem); text-transform: uppercase; letter-spacing: 0.05em; color: var(--cream); }

    /* ── Changelog ── */
    .changelog-wrap { max-width: 760px; margin: 0 auto; padding: 4rem 2rem 6rem; }

    .cl-group { margin-bottom: 3.5rem; }
    .cl-group-label {
      font-family: 'NativeRecordSans', sans-serif;
      font-size: 0.6rem; letter-spacing: 0.28em; text-transform: uppercase;
      color: var(--olive); margin-bottom: 1.5rem;
      padding-bottom: 0.6rem; border-bottom: 1px solid rgba(138,129,83,0.35);
    }

    .cl-entry { display: grid; grid-template-columns: 100px 1fr; gap: 0 2rem; margin-bottom: 1.75rem; }
    .cl-version {
      font-family: 'NativeRecordSans', sans-serif;
      font-size: 0.78rem; color: var(--green-dark);
      padding-top: 0.1rem; white-space: nowrap; letter-spacing: 0.04em;
    }
    .cl-datetime { font-size: 0.68rem; color: var(--olive); margin-bottom: 0.5rem; letter-spacing: 0.03em; }
    .cl-items { list-style: none; }
    .cl-items li { font-size: 0.82rem; color: var(--text-mid); line-height: 1.65; padding-left: 1rem; position: relative; margin-bottom: 0.25rem; }
    .cl-items li::before { content: '—'; position: absolute; left: 0; color: var(--olive); }

    .cl-tag { display: inline-block; font-family: 'NativeRecordSans', sans-serif; font-size: 0.52rem; letter-spacing: 0.14em; text-transform: uppercase; padding: 0.15rem 0.45rem; border-radius: 3px; margin-right: 0.35rem; vertical-align: middle; position: relative; top: -1px; }
    .cl-tag--feat  { background: rgba(55,63,46,0.12); color: var(--green-dark); }
    .cl-tag--fix   { background: rgba(196,130,42,0.15); color: #8a5a10; }
    .cl-tag--docs  { background: rgba(138,129,83,0.2); color: var(--text-mid); }
    .cl-tag--chore { background: rgba(138,129,83,0.2); color: var(--text-mid); }

    .cl-loading { text-align: center; padding: 4rem 2rem; font-family: 'NativeRecordSans', sans-serif; font-size: 0.75rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--olive); }

    /* ── Footer ── */
    #site-footer { background: var(--green-dark); padding: 4rem 2rem 2rem; color: rgba(221,217,188,0.65); }
    .footer-inner { max-width: 1100px; margin: 0 auto; display: grid; grid-template-columns: auto 1fr auto; gap: 4rem; align-items: start; margin-bottom: 3rem; }
    .footer-brand img.footer-logo { height: 110px; width: auto; }
    .footer-nav { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem 3rem; }
    .footer-nav ul { list-style: none; }
    .footer-nav ul li { margin-bottom: 0.65rem; }
    .footer-nav ul li a { font-family: 'NativeRecordSans', sans-serif; font-size: 0.82rem; color: rgba(221,217,188,0.6); transition: color 0.2s; }
    .footer-nav ul li a:hover { color: var(--cream); }
    .footer-contact h4 { font-family: 'NativeRecordSans', sans-serif; font-size: 0.62rem; letter-spacing: 0.25em; text-transform: uppercase; color: var(--amber); margin-bottom: 1rem; }
    .footer-contact p { font-size: 0.85rem; line-height: 1.8; color: rgba(221,217,188,0.7); margin-bottom: 0.5rem; }
    .footer-contact a { color: rgba(221,217,188,0.7); transition: color 0.2s; }
    .footer-contact a:hover { color: var(--cream); }
    .footer-bottom { max-width: 1100px; margin: 0 auto; padding-top: 1.5rem; border-top: 1px solid rgba(221,217,188,0.15); text-align: center; font-family: 'NativeRecordSans', sans-serif; font-size: 0.72rem; color: rgba(221,217,188,0.35); }
    .site-version { font-size: 0.6rem; opacity: 0.6; }

    /* ── Responsive ── */
    @media (max-width: 1024px) {
      .footer-inner { grid-template-columns: 1fr; gap: 2rem; }
      .footer-brand { display: none; }
    }
    @media (max-width: 768px) {
      .nav-links { display: none; }
      .hamburger { display: flex; }
      .nav-inner { display: flex; justify-content: space-between; align-items: center; }
      .footer-nav { grid-template-columns: 1fr; }
      .cl-entry { grid-template-columns: 1fr; gap: 0.2rem; }
      .cl-version { color: var(--olive); }
    }
  </style>
</head>
<body>

  <div id="site-nav-placeholder"></div>
  <script src="js/nav-loader.js" defer></script>

  <div class="page-hero">
    <span class="page-hero-label">Build history</span>
    <h1 class="page-hero-title">Changelog</h1>
  </div>

  <div class="changelog-wrap" id="changelog-wrap">
    <div class="cl-loading">Loading release history…</div>
  </div>

  <div id="site-footer-placeholder"></div>
  <script src="js/footer-loader.js" defer></script>

  <script>
    function groupLabel(version, displayDate) {
      const [major, minor] = version.replace('v','').split('.').map(Number);
      const monthYear = displayDate ? displayDate.replace(/\s+\d+,/, ',') : '';
      if (major === 0 && minor === 1) return `Version 0.1 — Initial Build`;
      return `Version ${major}.${minor} — ${monthYear}`;
    }

    function renderEntry(entry) {
      const tag = `<span class="cl-tag cl-tag--${entry.type}">${entry.type}</span>`;
      return `<li>${tag}${entry.description}</li>`;
    }

    function renderRelease(release) {
      const entries = release.entries.map(renderEntry).join('');
      return `
        <div class="cl-entry">
          <span class="cl-version">${release.version}</span>
          <div class="cl-content">
            <div class="cl-datetime">${release.display_date} &middot; ${release.display_time}</div>
            <ul class="cl-items">${entries}</ul>
          </div>
        </div>`;
    }

    async function loadChangelog() {
      const wrap = document.getElementById('changelog-wrap');
      try {
        const res  = await fetch('data/changelog.json');
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();

        const groups = new Map();
        for (const release of data.releases) {
          const [major, minor] = release.version.replace('v','').split('.').map(Number);
          const key = `${major}.${minor}`;
          if (!groups.has(key)) groups.set(key, { label: groupLabel(release.version, release.display_date), releases: [] });
          groups.get(key).releases.push(release);
        }

        let html = '';
        for (const [, group] of groups) {
          html += `
            <div class="cl-group">
              <p class="cl-group-label">${group.label}</p>
              ${group.releases.map(renderRelease).join('')}
            </div>`;
        }

        wrap.innerHTML = html;
      } catch (err) {
        wrap.innerHTML = `<p style="padding:3rem;text-align:center;color:var(--amber);">Unable to load changelog.</p>`;
        console.error('changelog:', err);
      }
    }

    document.addEventListener('DOMContentLoaded', loadChangelog);
  </script>
</body>
</html>
